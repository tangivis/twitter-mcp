site_name: twikit-mcp
site_url: https://tangivis.github.io/twitter-mcp/
site_description: Twitter/X MCP server powered by twikit — no API key needed
repo_name: tangivis/twitter-mcp
repo_url: https://github.com/tangivis/twitter-mcp
edit_uri: edit/main/docs/

# Layout (since the i18n upgrade in PR #51-ish):
#
#   docs/
#     index.{en,zh,ja}.md          ← landing page per locale
#     cli.{en,zh,ja}.md            ← CLI usage per locale
#     api.{en,zh,ja}.md            ← auto-generated, locale-aware (chrome
#                                    is translated; tool docstrings stay
#                                    English since they are Python types)
#     TECHNICAL.zh.md              ← original 中文 deep-dive
#     TECHNICAL.{en,ja}.md         ← stubs pointing at the .zh version
#     VENDORING.zh.md
#     VENDORING.{en,ja}.md         ← same stub pattern
#
# `docs_structure: suffix` is the cleanest — a single `docs/` tree where
# each markdown file gets a `.<locale>.md` suffix. The plugin builds
# `/`, `/zh/`, `/ja/` URL paths automatically and inserts a language
# switcher in the top bar.
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
          nav:
            - Home: index.md
            - Install: install.md
            - CLI mode: cli.md
            - MCP Tools API: api.md
            - Internals:
                - Technical design: TECHNICAL.md
                - Vendoring twikit: VENDORING.md
        - locale: zh
          name: 中文
          link: /zh/
          build: true
          nav:
            - 首页: index.md
            - 安装: install.md
            - CLI 模式: cli.md
            - MCP 工具 API: api.md
            - 内部实现:
                - 技术设计: TECHNICAL.md
                - Vendoring twikit: VENDORING.md
        - locale: ja
          name: 日本語
          link: /ja/
          build: true
          nav:
            - ホーム: index.md
            - インストール: install.md
            - CLI モード: cli.md
            - MCP ツール API: api.md
            - 内部実装:
                - 技術設計: TECHNICAL.md
                - twikit のベンダリング: VENDORING.md
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: false
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tangivis/twitter-mcp
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/twikit-mcp/
