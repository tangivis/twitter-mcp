name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

  test:
    name: "Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Import check
        run: uv run python -c "from twitter_mcp.server import mcp; print('OK:', len(mcp._tool_manager._tools), 'tools')"

      - name: Run tests with coverage
        run: uv run pytest -v --cov --cov-report=term --cov-fail-under=95

  protocol:
    name: MCP Protocol Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: MCP initialize handshake
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.1"}}}' \
            | uv run python -m twitter_mcp.server \
            | uv run python -c "import json, sys; resp = json.loads(sys.stdin.readline()); assert resp['result']['serverInfo']['name'] == 'twitter'; print('MCP handshake OK')"

# Issue #54: the auto-fix-on-CI-fail job that previously lived here was
# removed. CI failures show up directly on the PR; the maintainer (via
# Claude Code) decides whether to push a fix or close the PR. The
# `auto_summon_claude.sh` helper is still in the tree because live-smoke
# uses it — that loop stays as a post-release safety net.
