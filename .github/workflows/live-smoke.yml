name: Live integration smoke test

# Verifies get_article actually pulls a real X Article body.
# Uses a burner X account's cookies stored as repo secrets:
#   TWITTER_CT0
#   TWITTER_AUTH_TOKEN
#
# Never run against forks — secrets aren't exposed there anyway, and the
# `if: github.repository == 'tangivis/twitter-mcp'` guard makes that explicit.

on:
  workflow_dispatch: {}
  schedule:
    # Mondays 12:00 UTC — weekly canary.
    - cron: "0 12 * * 1"
  push:
    branches: [main]
    paths:
      - "twitter_mcp/**"
      - ".github/workflows/live-smoke.yml"

# Cancel an in-flight run if a new push lands; only one live-smoke per ref.
concurrency:
  group: live-smoke-${{ github.ref }}
  cancel-in-progress: true

# `issues: write` lets the failure-summary step post a comment on the
# tracking issue (#37, "live-smoke status"). All other scopes default to `none`.
permissions:
  issues: write

jobs:
  smoke:
    name: 25 idempotent reads (live)
    if: github.repository == 'tangivis/twitter-mcp'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Mask cookies in all subsequent logs
        env:
          CT0: ${{ secrets.TWITTER_CT0 }}
          AUTH: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: |
          # ::add-mask:: tells the runner to redact this string from any
          # later log line. Safety net in case anything echoes a header
          # or the cookies file.
          echo "::add-mask::$CT0"
          echo "::add-mask::$AUTH"

      - name: Write cookies file
        env:
          CT0: ${{ secrets.TWITTER_CT0 }}
          AUTH: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: |
          if [ -z "$CT0" ] || [ -z "$AUTH" ]; then
            echo "::error::TWITTER_CT0 / TWITTER_AUTH_TOKEN secrets are not set."
            exit 1
          fi
          mkdir -p "$HOME/.config/twitter-mcp"
          # Use jq -n so the values never appear on a shell command line.
          jq -n --arg c "$CT0" --arg a "$AUTH" \
            '{ct0:$c, auth_token:$a}' \
            > "$HOME/.config/twitter-mcp/cookies.json"
          chmod 600 "$HOME/.config/twitter-mcp/cookies.json"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Smoke 25 idempotent reads against real X
        # Each block hits a different twikit code path. If X rotates a
        # GraphQL queryId, changes a field, or moves an endpoint, this
        # surfaces it within 7 days (cron) instead of when the next
        # caller hits the dead code path. Strictly read-only — zero
        # side effects on the burner account.
        #
        # Each check is wrapped so failures collect (rather than
        # fail-fast) — one X update breaking 3 tools shows all 3 in
        # the same run, not just the first. Whole step still exits 1
        # if any check failed.
        #
        # Targets chosen for stability / public visibility:
        #   - get_article: Jaden_riku's article (verified e2e in issue #10)
        #   - get_tweet: Jack's stable #20
        #   - get_user_info: elonmusk (highest-traffic public account)
        #   - search_tweets: "AI" Top product (always has hits)
        #   - get_timeline: cookie-identity home feed
        #   - get_trends: globally-available trending list
        #   - get_user_followers: vercel (stable mid-size handle)
        #   - get_lists: own lists (cookie identity, empty OK)
        run: |
          # Tee step output to smoke.log so the summary step below can post the
          # ✓/✗ lines to issue #37 even after the script exits non-zero.
          set -o pipefail
          uv run python - 2>&1 <<'PY' | tee smoke.log
          import asyncio, json
          from twitter_mcp.server import (
              # Original 8 (since 0.1.x).
              get_article,
              get_tweet,
              get_user_info,
              search_tweets,
              get_timeline,
              get_trends,
              get_user_followers,
              get_lists,
              # Issue #73: extend to all 25 idempotent reads.
              get_article_preview,
              get_bookmarks,
              get_communities_timeline,
              get_community,
              get_community_members,
              get_community_moderators,
              get_community_tweets,
              get_dm_history,
              get_favoriters,
              get_list,
              get_list_members,
              get_list_subscribers,
              get_list_tweets,
              get_notifications,
              get_retweeters,
              get_scheduled_tweets,
              get_user_following,
              get_user_tweets,
              search_community,
              search_community_tweet,
              search_user,
          )

          # Issue #73 stable target IDs (last verified 2026-05-06):
          #   - LIST_ID: a long-lived public list. If deleted/rotated, the
          #     `tolerate_substr=("not found",)` arm will swallow the failure
          #     and we'll re-pick on the next run.
          #   - COMMUNITY_ID: similarly a stable public X Community.
          # These are the only knobs we hardcode beyond what the original 8
          # already used (`elonmusk`, `vercel`, jack's tweet `20`, article
          # `2048420352397864960`).
          LIST_ID = "1093659386737872897"
          COMMUNITY_ID = "1487102351550775303"

          successes = []
          failures = []

          async def check(name, coro, validate, tolerate_substr=()):
              """Run one read, capture pass/fail, never bubble exceptions out.

              `tolerate_substr` is a tuple of substrings that, when present
              in `<ExceptionType>: <message>`, mark the check as tolerated
              rather than failed. Started life covering only `ToolError` for
              X-gating drift (#37, e.g. `User not found`); broadened in #74
              follow-up to **any** exception class so we can tolerate
              vendored-twikit parser drift (`IndexError: list index out of
              range` / `KeyError: 'rest_id'` / `ValueError: Invalid list id`)
              and HTTP-side gone-data (`HTTPStatusError: 404 Not Found`)
              that aren't ToolError but are equally "X moved the cheese,
              not our bug."""
              try:
                  out = json.loads(await coro)
                  msg = validate(out)
                  successes.append(f"  ✓ {name}: {msg}")
              except Exception as e:
                  rendered = f"{type(e).__name__}: {e}"
                  if any(s in rendered for s in tolerate_substr):
                      successes.append(f"  ✓ {name}: tolerated ({rendered})")
                  elif isinstance(e, AssertionError):
                      failures.append(f"  ✗ {name}: assertion failed — {e}")
                  else:
                      failures.append(f"  ✗ {name}: {rendered}")

          def v_article(o):
              assert o.get("title"), "no title"
              assert len(o.get("plain_text", "")) > 1000, "body too short"
              return f"title={o['title'][:20]!r}, body={len(o['plain_text'])}c"

          def v_tweet(o):
              assert o.get("author") == "jack", f"unexpected author {o.get('author')!r}"
              assert o.get("id") == "20", "id mismatch"
              return "jack's #20 found"

          def v_user_info(o):
              assert o.get("screen_name") == "elonmusk", "screen_name mismatch"
              assert o.get("followers_count", 0) > 1_000_000, "follower count suspicious"
              return f"elonmusk has {o['followers_count']:,} followers"

          def v_search(o):
              # Don't assert non-empty: X has been actively gating search for low-trust
              # / new sessions; "AI" can legitimately return [] for a burner identity.
              # We're testing that the *tool* doesn't throw + returns proper shape, not
              # that X has data for us. (Same logic for v_trends / v_followers below.)
              assert isinstance(o, list), "not a list"
              return f"{len(o)} hits (empty OK — X may gate search for burner)"

          def v_timeline(o):
              assert isinstance(o, list), "not a list"
              return f"{len(o)} tweets (empty OK for new burner)"

          def v_trends(o):
              # Burner accounts and unset region commonly produce an empty trends list —
              # not a tool bug, X's gating.
              assert isinstance(o.get("trends"), list), "missing 'trends' key"
              return f"{len(o['trends'])} trends (empty OK — depends on burner region)"

          def v_followers(o):
              # Since 2024 X has tightened follower-list visibility — burner often
              # can't see another account's followers and gets `[]` back. Since
              # 2026-Q2 the gating extends further: X returns `User not found` for
              # the *target* user when the burner has insufficient trust to even
              # resolve the handle for follower-listing (observed on `vercel`,
              # 2026-05-06, run 25460864625). Both modes are tolerated as long as
              # the *tool* doesn't crash on a real network response — the
              # `tolerate_substr` arm of `check()` covers the ToolError path.
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} followers visible (empty OK — X gates follower lists)"

          def v_lists(o):
              assert isinstance(o.get("lists"), list), "missing 'lists' key"
              return f"{len(o['lists'])} lists (empty OK)"

          # ── Issue #73 shape-only validators ────────────────────
          # Pattern matches v_search / v_trends / v_followers above:
          # only assert the response *shape* (key presence + type).
          # Burners often see `[]` due to X anti-abuse gating; that's
          # tolerated. The `tolerate_substr` arm in `check()` handles
          # the ToolError-not-found case (issue #37 drift).

          def v_user_tweets(o):
              assert isinstance(o, list), "not a list"
              return f"{len(o)} tweets"

          def v_user_following(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} following visible (empty OK — X gates following lists)"

          def v_favoriters(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} favoriters (empty OK — X gates engagement lists)"

          def v_retweeters(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} retweeters (empty OK — X gates engagement lists)"

          def v_bookmarks(o):
              assert isinstance(o.get("tweets"), list), "missing 'tweets' key"
              return f"{len(o['tweets'])} bookmarks (own data — burner usually 0)"

          def v_notifications(o):
              assert isinstance(o.get("notifications"), list), (
                  "missing 'notifications' key"
              )
              return f"{len(o['notifications'])} notifications (own data — burner usually 0)"

          def v_dm_history(o):
              assert isinstance(o.get("messages"), list), "missing 'messages' key"
              return f"{len(o['messages'])} DM messages (empty OK — burner has no DMs)"

          def v_scheduled_tweets(o):
              assert isinstance(o.get("scheduled_tweets"), list), (
                  "missing 'scheduled_tweets' key"
              )
              return f"{len(o['scheduled_tweets'])} scheduled (own data — burner usually 0)"

          def v_list(o):
              assert isinstance(o, dict), "not a dict"
              return f"list keys={sorted(o.keys())[:3]}"

          def v_list_tweets(o):
              assert isinstance(o, list), "not a list"
              return f"{len(o)} list tweets (empty OK)"

          def v_list_members(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} list members (empty OK)"

          def v_list_subscribers(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} list subscribers (empty OK)"

          def v_community(o):
              assert isinstance(o, dict), "not a dict"
              return f"community keys={sorted(o.keys())[:3]}"

          def v_search_community(o):
              assert isinstance(o.get("communities"), list), (
                  "missing 'communities' key"
              )
              return f"{len(o['communities'])} community hits (empty OK — X gates)"

          def v_search_community_tweet(o):
              assert isinstance(o, list), "not a list"
              return f"{len(o)} community-tweet hits (empty OK — X gates)"

          def v_communities_timeline(o):
              assert isinstance(o.get("tweets"), list), "missing 'tweets' key"
              return f"{len(o['tweets'])} community-timeline tweets (empty OK)"

          def v_community_tweets(o):
              assert isinstance(o, list), "not a list"
              return f"{len(o)} community tweets (empty OK)"

          def v_community_members(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} community members (empty OK)"

          def v_community_moderators(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} community moderators (empty OK)"

          def v_search_user(o):
              assert isinstance(o.get("users"), list), "missing 'users' key"
              return f"{len(o['users'])} user hits (empty OK — X gates user search)"

          def v_article_preview(o):
              # `get_article_preview` returns a JSON object with article
              # metadata. Shape varies; only assert it's a dict.
              assert isinstance(o, dict), "not a dict"
              return f"preview keys={sorted(o.keys())[:3]}"

          # Reused tolerance sets — X-gating modes seen in the wild.
          # (Strings match against `<ExceptionType>: <message>` rendered
          # form, so `"IndexError"` or `"list index out of range"` works.)
          T_USER = ("User not found",)
          T_TWEET = ("Tweet not found", "not authorized", "not visible")
          # Lists/communities suffer from vendored-twikit parser drift
          # (#73 follow-up): X returns shapes with optional fields the
          # parser still accesses by `[]` / index. Tolerate while we plan
          # the deeper defensive-parse fix in `_vendor/twikit/`.
          T_DRIFT = (
              "list index out of range",  # twikit parser .[0] on empty
              "KeyError: 'created_at'",   # List model expects field X dropped
              "KeyError: 'rest_id'",      # Community model expects field X dropped
              "Invalid list id",          # twikit's list-id validator too strict
          )
          # T_LIST no longer includes T_DRIFT — list.py + _get_list_users +
          # get_list_tweets are now defensively parsed (issue #76 list patch
          # in 0.1.28). If `IndexError` / `KeyError 'created_at'` reappears
          # on a list tool, that's a real regression we want to see.
          #
          # `Invalid list id` IS retained as X-gating tolerance (not a
          # parser bug): twikit raises this when the response has no
          # `entries` key at all — i.e. X completely gated the list
          # timeline for the burner. Same class as `User not found` on
          # follower lists (#37).
          T_LIST = ("List not found", "not found", "Invalid list id")
          # T_COMM no longer pulls T_DRIFT — community.py + community
          # client helpers are now defensively parsed (issue #76 part 2).
          # `Community not found` / `not authorized` retained as
          # legitimate X-gating signals (path b).
          T_COMM = ("Community not found", "not found", "not authorized")
          T_DM = ("Cannot send messages", "User not found", "no DM")
          # T_SEARCH no longer == T_DRIFT — community search now defensively
          # parses; user-search side effectively never raises (returns
          # `[]`/empty users array). Retain `not authorized` for X gating.
          T_SEARCH = ("not authorized",)
          # T_ARTICLE_PREVIEW now has only the explicit ToolError text our
          # server.py raises on 404; raw HTTPStatusError no longer leaks
          # (issue #76 part 3).
          T_ARTICLE_PREVIEW = (
              "Article preview unavailable",
              "does not embed an article",
          )

          async def main():
              # Original 8 (unchanged).
              await check("get_article",        get_article("2048420352397864960"), v_article)
              await check("get_tweet",          get_tweet("20"), v_tweet)
              await check("get_user_info",      get_user_info(screen_name="elonmusk"), v_user_info)
              await check("search_tweets",      search_tweets(query="AI", count=5, product="Top"), v_search)
              await check("get_timeline",       get_timeline(count=5), v_timeline)
              await check("get_trends",         get_trends(category="trending", count=5), v_trends)
              await check(
                  "get_user_followers",
                  get_user_followers(screen_name="vercel", count=5),
                  v_followers,
                  # X-gating drift: `User not found` from the burner is treated
                  # as benign (issue #37, 2026-05-06).
                  tolerate_substr=T_USER,
              )
              await check("get_lists",          get_lists(count=5), v_lists)

              # ── Issue #73 extension: 17 more idempotent reads ────
              # User content
              await check("get_user_tweets", get_user_tweets(screen_name="elonmusk", count=5), v_user_tweets, tolerate_substr=T_USER)
              await check("get_user_following", get_user_following(screen_name="vercel", count=5), v_user_following, tolerate_substr=T_USER)
              # Engagement (target = jack's #20)
              await check("get_favoriters", get_favoriters(tweet_id="20", count=5), v_favoriters, tolerate_substr=T_TWEET)
              await check("get_retweeters", get_retweeters(tweet_id="20", count=5), v_retweeters, tolerate_substr=T_TWEET)
              # Burner-owned reads (no gating expected, empty OK)
              await check("get_bookmarks", get_bookmarks(count=5), v_bookmarks)
              await check("get_notifications", get_notifications(count=5), v_notifications)
              await check("get_dm_history", get_dm_history(screen_name="elonmusk"), v_dm_history, tolerate_substr=T_DM)
              await check("get_scheduled_tweets", get_scheduled_tweets(), v_scheduled_tweets)
              # Lists
              await check("get_list", get_list(list_id=LIST_ID), v_list, tolerate_substr=T_LIST)
              await check("get_list_tweets", get_list_tweets(list_id=LIST_ID, count=5), v_list_tweets, tolerate_substr=T_LIST)
              await check("get_list_members", get_list_members(list_id=LIST_ID, count=5), v_list_members, tolerate_substr=T_LIST)
              await check("get_list_subscribers", get_list_subscribers(list_id=LIST_ID, count=5), v_list_subscribers, tolerate_substr=T_LIST)
              # Communities
              await check("get_community", get_community(community_id=COMMUNITY_ID), v_community, tolerate_substr=T_COMM)
              await check("search_community", search_community(query="ai"), v_search_community, tolerate_substr=T_SEARCH)
              await check("search_community_tweet", search_community_tweet(community_id=COMMUNITY_ID, query="ai", count=5), v_search_community_tweet, tolerate_substr=T_COMM)
              await check("get_communities_timeline", get_communities_timeline(count=5), v_communities_timeline)
              await check("get_community_tweets", get_community_tweets(community_id=COMMUNITY_ID, tweet_type="Top", count=5), v_community_tweets, tolerate_substr=T_COMM)
              await check("get_community_members", get_community_members(community_id=COMMUNITY_ID, count=5), v_community_members, tolerate_substr=T_COMM)
              await check("get_community_moderators", get_community_moderators(community_id=COMMUNITY_ID, count=5), v_community_moderators, tolerate_substr=T_COMM)
              # Search
              await check("search_user", search_user(query="vercel", count=5), v_search_user, tolerate_substr=T_SEARCH)
              # Article preview (uses an article-bearing tweet's id; if X
              # changes the article system, tolerate via T_TWEET).
              await check("get_article_preview", get_article_preview(tweet_id="2048420352397864960"), v_article_preview, tolerate_substr=T_ARTICLE_PREVIEW)

              print("\n".join(successes))
              if failures:
                  print("\n".join(failures))
                  raise SystemExit(f"\n{len(failures)} of 25 checks failed against live X")
              print(f"\nAll 25 reads passed against live X.")

          asyncio.run(main())
          PY

      # If smoke.log exists, mirror its tail to the run summary so the failure
      # is visible from the workflow page without expanding the step. Always
      # runs (even on success) — successes show "All 25 reads passed".
      - name: Render summary
        if: always() && hashFiles('smoke.log') != ''
        run: |
          {
            echo "### live-smoke (25 idempotent reads)"
            echo
            echo '```'
            tail -n 40 smoke.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # On failure, post the ✗ lines to the tracking issue (#37) as a comment.
      # This makes the failure detail readable via mcp__github__issue_read,
      # closing the observability gap (we can't read raw run logs from MCP).
      # Skips silently if the issue doesn't exist yet (curl returns 404).
      - name: Post failure summary + auto-summon @claude on issue #37
        if: failure() && hashFiles('smoke.log') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          # Extract just the ✗ lines (one per failed read).
          fails=$(grep -E '^\s*✗' smoke.log || true)
          if [ -z "$fails" ]; then
            echo "No ✗ lines in log; nothing to post."
            exit 0
          fi

          sha7="${SHA:0:7}"

          # Per-SHA dedup. Two failure paths converge here:
          #   1. cron re-runs on the same `main` SHA each Monday → don't keep
          #      pinging Claude every week for the same already-known failure.
          #   2. Manual `workflow_dispatch` re-runs on the same SHA → same.
          # We grep existing comments on issue #37 for the exact opener
          # "live-smoke failed on `<sha7>`" — that's the unique header we
          # always emit below, so it's a reliable dedup key.
          existing=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/37/comments?per_page=100" \
            | jq -r '.[].body' \
            | grep -cF "live-smoke failed on \`$sha7\`" || true)
          if [ "$existing" -gt 0 ]; then
            echo "Already summoned @claude for $sha7; skipping (dedup)."
            exit 0
          fi

          # Build comment body. The `@claude` mention triggers `claude.yml`
          # which spawns a bot session that opens a TDD-fix PR. The prompt
          # is intentionally explicit so the bot doesn't guess between
          # the two valid fix paths (relax assertion vs. patch tool/vendor).
          read -r -d '' INSTRUCTIONS <<'EOM' || true
          @claude please open a draft PR that fixes this. Read the ✗ line(s) above and follow the project's TDD pattern:

          1. **Identify** which read tool failed and what the failure mode is (assertion, AttributeError, KeyError, NotFound, TooManyRequests, …).
          2. **Decide which fix path applies:**
             - **(a) Genuine tool drift** (queryId rotated, response field renamed, X moved an endpoint) → patch in `twitter_mcp/_vendor/twikit/`. Add a `# twitter-mcp patch (#<this-issue-37-comment-id>)` marker the same way `_vendor/twikit/client/gql.py::tweet_result_by_rest_id` is marked for issue #10. Document the patch in `docs/VENDORING.md` under the "本地 patch 清单" table.
             - **(b) Brittle live-smoke assertion** (X legitimately gates this data for the burner, e.g. follower lists for accounts you don't follow) → loosen the validator in `.github/workflows/live-smoke.yml` to shape-only. Explain *why* in the comment alongside the validator (the existing `v_search` / `v_trends` / `v_followers` comments are the template).
             - **(c) Defensive parse fix** (response shape changed but tool can recover with `.get(...)` defaults) → patch `twitter_mcp/server.py` or the relevant `_vendor/twikit/*.py` model with `.get()` defaults the same way `User.__init__` was hardened in 0.1.4 / `Tweet` in 0.1.5.
          3. **Add a regression test** in `tests/test_tools.py` (or a new test file) that reproduces the failure mode against a mock and would have caught it pre-merge.
          4. Keep all existing tests green and `--cov-fail-under=95` on `twitter_mcp/server.py`.
          5. Open the PR as draft; do NOT merge.

          If multiple ✗ lines, do them all in one PR but in separate commits (one TDD red→green cycle per failure mode).

          Context this issue (#37) tracks: `live-smoke` runs against real X with burner cookies; failures are recurring due to X's anti-abuse / gating drift. See PR #38 for the observability + assertion-relaxation precedent.
          EOM

          payload=$(jq -nc \
            --arg url "$RUN_URL" \
            --arg sha "$sha7" \
            --arg fails "$fails" \
            --arg instr "$INSTRUCTIONS" \
            '{body: "live-smoke failed on `\($sha)` — [run](\($url))\n\n```\n\($fails)\n```\n\n---\n\n\($instr)"}')

          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "$payload" \
            "https://api.github.com/repos/$REPO/issues/37/comments" \
            -w "\nHTTP %{http_code}\n"
