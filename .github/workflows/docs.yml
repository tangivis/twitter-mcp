name: Docs (GitHub Pages)

# Builds the MkDocs site and deploys to GitHub Pages.
#
# One-time setup the repo owner needs to do:
#   1. Settings → Pages → Source = "GitHub Actions"
#      (the deploy step won't work until this is set)
#   2. Nothing else — branch protection / auto-merge / secrets all
#      irrelevant to docs deploy.

on:
  push:
    branches: [main]
    paths:
      - "twitter_mcp/**"          # tool docstrings → API reference
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/gen_api_docs.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel any running one when a new
# main push arrives.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python + docs deps
        run: |
          uv python install 3.13
          uv sync --group dev --group docs

      - name: Generate api.md
        # gen_api_docs.py walks the live mcp._tool_manager registry and
        # writes docs/api.md (gitignored). Runs BEFORE mkdocs build so
        # the i18n plugin sees a real on-disk file (the on_config /
        # on_files event ordering doesn't play nicely with mkdocs-gen-files'
        # virtual-file approach when i18n is also active).
        run: uv run --group docs python scripts/gen_api_docs.py

      - name: Build site
        # NOT --strict: TECHNICAL.zh.md contains intra-doc anchor links
        # using Chinese headings (e.g. `#什么是-mcp`) that GitHub's markdown
        # renderer slugifies but mkdocs's default doesn't. Site still
        # builds and serves correctly — those specific in-page jump links
        # won't resolve. Tracked as a future cleanup.
        run: uv run --group docs mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
