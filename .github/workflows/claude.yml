name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Two gates ANDed:
    #   1. The body contains `@claude` (original trigger).
    #   2. The author is OWNER / COLLABORATOR / MEMBER — i.e. someone the
    #      repo has explicitly granted write access to.  Random visitors
    #      (`CONTRIBUTOR`, `FIRST_TIME_CONTRIBUTOR`, `NONE`) cannot burn
    #      the maintainer's `CLAUDE_CODE_OAUTH_TOKEN` plan quota by typing
    #      `@claude` in any issue / PR comment.
    #
    # `author_association` lives in different places per event type:
    #   issue_comment / pull_request_review_comment → event.comment.…
    #   pull_request_review                        → event.review.…
    #   issues                                     → event.issue.…
    if: |
      (
        (github.event_name == 'issue_comment'
         && contains(github.event.comment.body, '@claude')
         && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'),
                     github.event.comment.author_association))
        ||
        (github.event_name == 'pull_request_review_comment'
         && contains(github.event.comment.body, '@claude')
         && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'),
                     github.event.comment.author_association))
        ||
        (github.event_name == 'pull_request_review'
         && contains(github.event.review.body, '@claude')
         && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'),
                     github.event.review.author_association))
        ||
        (github.event_name == 'issues'
         && (contains(github.event.issue.body, '@claude')
             || contains(github.event.issue.title, '@claude'))
         && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'),
                     github.event.issue.author_association))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Pin model + turn cap to control plan-quota burn.
          #
          # Sonnet 4.6 is plenty for 90% of issue triage / small fixes /
          # PR feedback in this repo. (Reference: pr-review.yml runs on
          # MiniMax M2 — strictly weaker — and converges within 5 review
          # iterations on real PRs.) Opus 4.7 is reserved for cases the
          # maintainer drives locally via Claude Code; routing the
          # GitHub bot to Opus on every @claude burns ~5× the tokens
          # without proportional payoff for this codebase's complexity.
          #
          # max-turns 15 caps a runaway loop (each turn = one LLM call
          # + tool action). 15 covers a typical TDD red→green→PR cycle
          # with headroom; if the bot can't finish in 15 turns the
          # task probably needed local Claude Code anyway.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
